<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oxford 3000">
<title>Oxford 3000</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e10;--surface:#1a1a1e;--card:#222228;--border:#2e2e38;--accent:#e8c97e;--accent2:#7e9ee8;--text:#f0ede6;--muted:#6b6b7a;--green:#5ecb8a;--red:#e86b6b;--yellow:#f0c040;--radius:20px;--nav-h:64px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(232,201,126,.06) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 85% 90%,rgba(126,158,232,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;padding-top:env(safe-area-inset-top,0px);padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px))}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 8px;flex-shrink:0}
.logo{font-family:'Playfair Display',serif;font-size:17px;color:var(--accent)}
.logo span{color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;margin-left:6px}
#settings-btn{background:none;border:1px solid var(--border);border-radius:9px;color:var(--muted);padding:5px 11px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer}
#settings-btn:active{background:var(--border)}
.mode-bar{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:52px}
.mode-info .mode-title{font-size:13px;color:var(--text)}
.mode-info .mode-sub{font-size:11px;color:var(--muted);margin-top:2px}
.mode-bar.mode-review{border-color:rgba(232,107,107,.25);background:rgba(232,107,107,.05)}
.mode-bar.mode-review .mode-title{color:var(--red)}
.mode-bar.mode-favorites{border-color:rgba(240,192,64,.25);background:rgba(240,192,64,.05)}
.mode-bar.mode-favorites .mode-title{color:var(--yellow)}
.mode-bar.mode-free{border-color:rgba(126,158,232,.2);background:rgba(126,158,232,.05)}
.mode-bar.mode-free .mode-title{color:var(--accent2)}
.progress-wrap{padding:0 16px 8px;flex-shrink:0}
.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.progress-track{height:2px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 16px;perspective:1200px;position:relative;overflow:hidden}
#star-btn{position:absolute;top:12px;right:24px;z-index:20;width:38px;height:38px;border-radius:50%;background:rgba(14,14,16,.7);backdrop-filter:blur(8px);border:1px solid var(--border);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s}
#star-btn:active{transform:scale(.9);background:rgba(240,192,64,.2)}
#star-btn.active{background:rgba(240,192,64,.15);border-color:rgba(240,192,64,.4)}
.card-wrap{width:100%;max-width:400px;height:min(330px,50vw + 110px);position:relative;transform-style:preserve-3d;transition:transform .52s cubic-bezier(.4,0,.2,1);cursor:pointer;user-select:none}
.card-wrap.flipped{transform:rotateY(180deg)}
.card-wrap.swipe-right{animation:swipeRight .36s ease forwards}
.card-wrap.swipe-left{animation:swipeLeft .36s ease forwards}
@keyframes swipeRight{to{transform:translateX(115%) rotate(14deg);opacity:0}}
@keyframes swipeLeft{to{transform:translateX(-115%) rotate(-14deg);opacity:0}}
.card-face{position:absolute;inset:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 22px;box-shadow:0 16px 50px rgba(0,0,0,.45)}
.card-face.back{transform:rotateY(180deg);background:#1e1e2a;border-color:rgba(126,158,232,.18)}
.card-label{font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.card-face.back .card-label{color:var(--accent2);opacity:.65}
.card-word{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,32px);text-align:center;line-height:1.35}
.card-face.back .card-word{color:var(--accent2);font-size:clamp(26px,6vw,40px)}
.tap-hint{position:absolute;bottom:16px;font-size:10px;color:var(--muted);opacity:.5;letter-spacing:.07em}
.swipe-indicator{position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;opacity:0;transition:opacity .12s;display:flex;align-items:center;justify-content:center;font-size:34px;z-index:10}
.swipe-indicator.right{background:rgba(94,203,138,.12);border:2px solid var(--green)}
.swipe-indicator.left{background:rgba(232,107,107,.12);border:2px solid var(--red)}
.stats{display:flex;justify-content:center;gap:28px;padding:4px 16px 6px;flex-shrink:0}
.stat{text-align:center}
.stat-val{font-size:17px}
.stat-val.green{color:var(--green)}
.stat-val.red{color:var(--red)}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-top:1px}
.actions{display:flex;gap:12px;padding:6px 16px 10px;flex-shrink:0;justify-content:center}
.action-btn{flex:1;max-width:155px;height:52px;border:none;border-radius:13px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.03em;cursor:pointer;transition:all .16s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-no{background:rgba(232,107,107,.11);color:var(--red);border:1px solid rgba(232,107,107,.22)}
.btn-yes{background:rgba(94,203,138,.11);color:var(--green);border:1px solid rgba(94,203,138,.22)}
.btn-flip{background:rgba(232,201,126,.09);color:var(--accent);border:1px solid rgba(232,201,126,.18);max-width:130px}
.btn-no:active{background:rgba(232,107,107,.22);transform:scale(.96)}
.btn-yes:active{background:rgba(94,203,138,.22);transform:scale(.96)}
.btn-flip:active{background:rgba(232,201,126,.18);transform:scale(.96)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:rgba(14,14,16,.92);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:50}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 2px;position:relative}
.nav-btn .nav-icon{font-size:20px;transition:transform .15s}
.nav-btn .nav-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.06em;transition:color .15s}
.nav-btn.active .nav-label{color:var(--accent)}
.nav-btn:active .nav-icon{transform:scale(.88)}
.nav-badge{position:absolute;top:0;right:calc(50% - 18px);background:var(--red);color:white;font-size:9px;font-family:'DM Mono',monospace;min-width:16px;height:16px;border-radius:99px;display:none;align-items:center;justify-content:center;padding:0 3px}
.nav-badge.show{display:flex}
.empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;padding:20px;text-align:center}
.empty-state.show{display:flex}
.empty-icon{font-size:52px}
.empty-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--text)}
.empty-sub{font-size:12px;color:var(--muted);line-height:1.6;max-width:260px}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:flex-end}
.panel-overlay.open{display:flex}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:22px 22px 0 0;padding:22px 20px env(safe-area-inset-bottom,20px);width:100%;max-width:500px;margin:0 auto;animation:slideUp .28s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel h2{font-family:'Playfair Display',serif;font-size:19px;color:var(--accent);margin-bottom:18px}
.panel-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px}
.panel-row:last-of-type{border-bottom:none}
.panel-row label{color:var(--muted);font-size:10px;letter-spacing:.06em;text-transform:uppercase;display:block;margin-top:2px}
.toggle{width:42px;height:23px;background:var(--border);border-radius:99px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:17px;height:17px;background:white;border-radius:50%;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:22px}
.panel-section{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.panel-section-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.size-row{display:flex;gap:7px}
.size-btn{flex:1;padding:9px 4px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer}
.size-btn.active{background:rgba(232,201,126,.1);border-color:rgba(232,201,126,.28);color:var(--accent)}
.panel-btn{width:100%;margin-top:9px;padding:13px;background:rgba(232,201,126,.08);border:1px solid rgba(232,201,126,.18);border-radius:11px;color:var(--accent);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer}
.panel-btn:active{background:rgba(232,201,126,.18)}
.panel-btn.danger{background:rgba(232,107,107,.07);border-color:rgba(232,107,107,.18);color:var(--red)}
.complete-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;text-align:center}
.complete-screen.show{display:flex}
.complete-icon{font-size:58px;margin-bottom:20px}
.complete-title{font-family:'Playfair Display',serif;font-size:26px;color:var(--accent);margin-bottom:6px}
.complete-sub{color:var(--muted);font-size:12px;margin-bottom:24px;line-height:1.65;max-width:290px;white-space:pre-line}
.complete-stats{display:flex;gap:28px;margin-bottom:28px}
.complete-stat .val{font-size:34px}
.complete-stat .val.green{color:var(--green)}
.complete-stat .val.red{color:var(--red)}
.complete-stat .lbl{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-top:3px}
.complete-btns{display:flex;flex-direction:column;gap:9px;width:100%;max-width:270px}
.complete-btn{padding:14px 28px;background:var(--accent);color:#0e0e10;border:none;border-radius:13px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer}
.complete-btn.secondary{background:transparent;color:var(--muted);border:1px solid var(--border)}
.complete-btn.review-btn{background:rgba(232,107,107,.12);color:var(--red);border:1px solid rgba(232,107,107,.22)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Oxford 3000 <span>flashcards</span></div>
    <button id="settings-btn">&#9881; options</button>
  </header>
  <div class="mode-bar" id="mode-bar">
    <div class="mode-info">
      <div class="mode-title" id="mode-title">&#128197; Session du jour</div>
      <div class="mode-sub" id="mode-sub">chargement&#8230;</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-info"><span id="prog-text">0 / 30</span><span id="prog-pct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="card-area" id="card-area">
    <button id="star-btn" onclick="toggleFavorite()">&#9734;</button>
    <div class="card-wrap" id="card" ontouchstart="touchStart(event)" ontouchmove="touchMove(event)" ontouchend="touchEnd(event)">
      <div class="card-face front" onclick="flipCard()">
        <div class="card-label" id="front-label">Fran&#231;ais &#8594; Anglais</div>
        <div class="card-word" id="word-front">&#8212;</div>
        <div class="tap-hint">toucher pour retourner</div>
        <div class="swipe-indicator right" id="ind-right">&#10003;</div>
        <div class="swipe-indicator left" id="ind-left">&#10007;</div>
      </div>
      <div class="card-face back" onclick="flipCard()">
        <div class="card-label" id="back-label">Anglais</div>
        <div class="card-word" id="word-back">&#8212;</div>
        <div class="tap-hint">toucher pour retourner</div>
      </div>
    </div>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon" id="empty-icon">&#127881;</div>
      <div class="empty-title" id="empty-title">Pile vide</div>
      <div class="empty-sub" id="empty-sub"></div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val green" id="stat-known">0</div><div class="stat-lbl">valid&#233;s</div></div>
    <div class="stat"><div class="stat-val" id="stat-remain">30</div><div class="stat-lbl">restant</div></div>
    <div class="stat"><div class="stat-val red" id="stat-unknown">0</div><div class="stat-lbl">&#224; revoir</div></div>
  </div>
  <div class="actions">
    <button class="action-btn btn-no" onclick="answer(false)">&#10007; &#224; revoir</button>
    <button class="action-btn btn-flip" onclick="flipCard()">&#8635; retourner</button>
    <button class="action-btn btn-yes" onclick="answer(true)">&#10003; connu</button>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-day" onclick="setMode('day')">
    <span class="nav-icon">&#128197;</span><span class="nav-label">JOUR</span>
  </button>
  <button class="nav-btn" id="nav-review" onclick="setMode('review')">
    <span class="nav-icon">&#128260;</span><span class="nav-label">&#192; REVOIR</span>
    <span class="nav-badge" id="review-badge">0</span>
  </button>
  <button class="nav-btn" id="nav-favorites" onclick="setMode('favorites')">
    <span class="nav-icon">&#11088;</span><span class="nav-label">FAVORIS</span>
  </button>
  <button class="nav-btn" id="nav-free" onclick="setMode('free')">
    <span class="nav-icon">&#128256;</span><span class="nav-label">LIBRE</span>
  </button>
</nav>
<div class="panel-overlay" id="panel" onclick="closePanelOutside(event)">
  <div class="panel">
    <h2>Options</h2>
    <div class="panel-row">
      <div><div>Inverser les faces</div><label>afficher l&#39;anglais en premier</label></div>
      <button class="toggle" id="tog-reverse" onclick="toggleOpt('reverse')"></button>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Taille session libre</div>
      <div class="size-row">
        <button class="size-btn" data-size="10" onclick="setSize(10)">10</button>
        <button class="size-btn active" data-size="30" onclick="setSize(30)">30</button>
        <button class="size-btn" data-size="50" onclick="setSize(50)">50</button>
        <button class="size-btn" data-size="100" onclick="setSize(100)">100</button>
      </div>
    </div>
    <div class="panel-section">
      <button class="panel-btn" onclick="restartSession();closePanelDirect()">&#8635; Recommencer cette session</button>
      <button class="panel-btn danger" onclick="confirmClear()">&#128465; Effacer toute la progression</button>
    </div>
  </div>
</div>
<div class="complete-screen" id="complete-screen">
  <div class="complete-icon" id="c-icon">&#127942;</div>
  <div class="complete-title" id="c-title">Session termin&#233;e !</div>
  <div class="complete-sub" id="c-sub"></div>
  <div class="complete-stats">
    <div class="complete-stat"><div class="val green" id="c-known">0</div><div class="lbl">VALID&#201;S</div></div>
    <div class="complete-stat"><div class="val red" id="c-unknown">0</div><div class="lbl">&#192; REVOIR</div></div>
  </div>
  <div class="complete-btns" id="c-btns"></div>
</div>
<script>
